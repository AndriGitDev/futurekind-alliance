<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc"><title id="title">Alliance Council public credential</title><desc id="desc">A stylised public credential card for the 2040 Alliance Council.</desc><defs><linearGradient id="edge" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#65f7ff"/><stop offset=".5" stop-color="#c8ff6a"/><stop offset="1" stop-color="#9b7cff"/></linearGradient></defs><rect width="900" height="540" rx="42" fill="#02040c"/><rect x="22" y="22" width="856" height="496" rx="32" fill="#07111f" stroke="url(#edge)" stroke-width="3"/><g opacity=".13" stroke="#65f7ff"><path d="M80 90h740M80 170h740M80 250h740M80 330h740M80 410h740M150 55v430M300 55v430M450 55v430M600 55v430M750 55v430"/></g><g transform="translate(70 70)"><circle cx="75" cy="75" r="65" fill="none" stroke="url(#edge)" stroke-width="6"/><path d="M75 25l13 38 40 1-32 23 12 39-33-24-33 24 12-39-32-23 40-1 13-38z" fill="#e9fbff"/><text x="170" y="48" fill="#8fb3c4" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="800" letter-spacing="5">PUBLIC CREDENTIAL · 2040–2044</text><text x="170" y="103" fill="#e9fbff" font-family="Inter,system-ui,sans-serif" font-size="42" font-weight="900">Alliance Council</text><text x="173" y="142" fill="#c8ff6a" font-family="Inter,system-ui,sans-serif" font-size="21" font-weight="800" letter-spacing="4">RECALLABLE MANDATE REGISTER</text></g><g font-family="Inter,system-ui,sans-serif" transform="translate(82 255)"><text x="0" y="0" fill="#65f7ff" font-size="16" font-weight="900" letter-spacing="4">OPERATING LIMITS</text><text x="0" y="45" fill="#e9fbff" font-size="28" font-weight="800">Offices propose · Members ratify · Rights remain</text><text x="0" y="91" fill="#8fb3c4" font-size="19">No sale of member assets · no suspension of exit · no black-box sovereignty</text><text x="0" y="136" fill="#8fb3c4" font-size="19">Conflict registers auditable on civicnet relay FKA-PUB-7712</text></g><g transform=