<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Futurekind Alliance wordmark</title>
  <desc id="desc">A restrained civic-futurist wordmark for Futurekind Alliance with a federation seal and mandate line.</desc>
  <defs>
    <linearGradient id="edge" x1="40" y1="26" x2="180" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8fe8e2"/>
      <stop offset="0.55" stop-color="#b8e6c9"/>
      <stop offset="1" stop-color="#8ea0ff"/>
    </linearGradient>
    <linearGradient id="letters" x1="190" x2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eaf7f5"/>
      <stop offset="0.62" stop-color="#bfeeea"/>
      <stop offset="1" stop-color="#8fe8e2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-35%" width="140%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="220" rx="34" fill="#040912"/>
  <rect x="8" y="8" width="944" height="204" rx="28" fill="none" stroke="#20334b"/>
  <path d="M720 42h128M720 178h128M784 42v136" stroke="#8fe8e2" stroke-opacity="0.20" stroke-width="2"/>

  <g transform="translate(44 34)">
    <circle cx="76" cy="76" r="70" fill="#07111f" stroke="url(#edge)" stroke-width="5"/>
    <path d="M76 16a60 60 0 0 1 52 30M136 76a60 60 0 0 1-30 52M76 136a60 60 0 0 1-52-30M16 76a60 60 0 0 1 30-52" fill="none" stroke="url(#edge)" stroke-width="6" stroke-linecap="round"/>
    <path d="M76 32c14 20 22 34 22 44s-8 24-22 44c-14-20-22-34-22-44s8-24 22-44Z" fill="#eaf7f5"/>
    <path d="M32 76c20-14 34-22 44-22s24 8 44 22c-20 14-34 22-44 22s-24-8-44-22Z" fill="#8fe8e2" opacity="0.9"/>
    <circle cx="76" cy="76" r="18" fill="#07111f" stroke="#eaf7f5" stroke-width="3"/>
    <circle cx="76" cy="76" r="6" fill="#b8e6c9"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="188" y="91" fill="url(#letters)" font-size="52" font-weight="900" letter-spacing="3">FUTUREKIND</text>
    <text x="190" y="138" fill="#b8e6c9" font-size="27" font-weight="800" letter-spacing="13">ALLIANCE</text>
    <text x="192" y="174" fill="#95aeb8" font-size="14" font-weight="700" letter-spacing="3.6">MAXIMUM FREEDOM · SHARED ABUNDANCE · NO DOMINATION</text>
  </g>

  <g filter="url(#glow)">
    <circle cx="720" cy="42" r="4" fill="#8fe8e2"/>
    <circle cx="848" cy="42" r="4" fill="#b8e6c9"/>
    <circle cx="784" cy="178" r="4" fill="#8ea0ff"/>
    <circle cx="848" cy="178" r="4" fill="#8fe8e2"/>
  </g>
</svg>
