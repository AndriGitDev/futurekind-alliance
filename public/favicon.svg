<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Futurekind Alliance emblem</title>
  <desc id="desc">A restrained 2040 civic seal: an open federation ring, eight member nodes, and a central four-part commons aperture.</desc>
  <defs>
    <radialGradient id="field" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="0.62" stop-color="#07111f"/>
      <stop offset="1" stop-color="#030711"/>
    </radialGradient>
    <linearGradient id="edge" x1="72" y1="78" x2="436" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8fe8e2"/>
      <stop offset="0.52" stop-color="#b8e6c9"/>
      <stop offset="1" stop-color="#8ea0ff"/>
    </linearGradient>
    <linearGradient id="core" x1="162" y1="142" x2="348" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eaf7f5"/>
      <stop offset="0.5" stop-color="#8fe8e2"/>
      <stop offset="1" stop-color="#b8e6c9"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="#030711"/>
  <circle cx="256" cy="256" r="214" fill="url(#field)" stroke="#21324a" stroke-width="2"/>

  <g fill="none" stroke-linecap="round">
    <path d="M256 58a198 198 0 0 1 171 98" stroke="url(#edge)" stroke-width="10"/>
    <path d="M454 256a198 198 0 0 1-98 171" stroke="url(#edge)" stroke-width="10"/>
    <path d="M256 454a198 198 0 0 1-171-98" stroke="url(#edge)" stroke-width="10"/>
    <path d="M58 256a198 198 0 0 1 98-171" stroke="url(#edge)" stroke-width="10"/>
    <circle cx="256" cy="256" r="146" stroke="#8fe8e2" stroke-width="2" opacity="0.34"/>
    <circle cx="256" cy="256" r="96" stroke="#b8e6c9" stroke-width="2" opacity="0.24"/>
    <path d="M256 116v280M116 256h280M157 157l198 198M355 157 157 355" stroke="#8fe8e2" stroke-width="1.5" opacity="0.16"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M256 134c28 42 44 78 44 122s-16 80-44 122c-28-42-44-78-44-122s16-80 44-122Z" fill="url(#core)"/>
    <path d="M134 256c42-28 78-44 122-44s80 16 122 44c-42 28-78 44-122 44s-80-16-122-44Z" fill="#8fe8e2" opacity="0.88"/>
    <circle cx="256" cy="256" r="38" fill="#07111f" stroke="#eaf7f5" stroke-width="5"/>
    <circle cx="256" cy="256" r="13" fill="#b8e6c9"/>
  </g>

  <g fill="#07111f" stroke-width="7">
    <circle cx="256" cy="58" r="13" stroke="#8fe8e2"/>
    <circle cx="396" cy="116" r="13" stroke="#8ea0ff"/>
    <circle cx="454" cy="256" r="13" stroke="#8fe8e2"/>
    <circle cx="396" cy="396" r="13" stroke="#b8e6c9"/>
    <circle cx="256" cy="454" r="13" stroke="#8fe8e2"/>
    <circle cx="116" cy="396" r="13" stroke="#b8e6c9"/>
    <circle cx="58" cy="256" r="13" stroke="#8fe8e2"/>
    <circle cx="116" cy="116" r="13" stroke="#8ea0ff"/>
  </g>
